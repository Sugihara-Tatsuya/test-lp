name: Update Slack Dashboard

on:
  schedule:
    # Every 6 hours: 0:00, 6:00, 12:00, 18:00 JST (= 15:00, 21:00, 3:00, 9:00 UTC)
    - cron: '0 15,21,3,9 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: slack-dashboard/requirements.txt

      - name: Install dependencies
        run: pip install -r slack-dashboard/requirements.txt

      - name: Download DB from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p slack-dashboard/data
          gh release download db-latest \
            --pattern "slack_activity.db" \
            --dir slack-dashboard/data \
            --clobber 2>/dev/null || echo "No existing DB found, starting fresh"

      - name: Collect Slack data
        working-directory: slack-dashboard
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_DB_PATH: ./data/slack_activity.db
        run: |
          timeout 45m python collector.py || echo "::warning::Collector did not finish within timeout, continuing with partial data"

      - name: Generate dashboard HTML
        working-directory: slack-dashboard
        env:
          SLACK_DB_PATH: ./data/slack_activity.db
        run: python generate_static.py

      - name: Upload DB to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create release if it doesn't exist
          gh release create db-latest \
            --title "Dashboard DB (auto-updated)" \
            --notes "SQLite database for Slack dashboard. Auto-updated by GitHub Actions." \
            2>/dev/null || true
          # Upload DB (overwrite existing)
          gh release upload db-latest \
            slack-dashboard/data/slack_activity.db \
            --clobber

      - name: Deploy to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/slack-dashboard.html slack-dashboard/docs/index.html
          if git diff --cached --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "Auto-update Slack dashboard $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
